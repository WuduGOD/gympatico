services:
  postgres:
    image: postgres:16-alpine
    container_name: gympatico_db
    environment:
      POSTGRES_USER: gymadmin
      POSTGRES_PASSWORD: mysecretpassword
      POSTGRES_DB: gympatico_dev
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql # Mapujemy nasz skrypt SQL

volumes:
  postgres_data: